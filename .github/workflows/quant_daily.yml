name: 퀀트 스크리너 매일 자동 실행 (스크리닝 전용)

on:
  # ── 매일 오후 7시 (KST = UTC+9 → UTC 10:00) ──
  # 정시(00분)는 GitHub Actions 부하가 몰려 지연/드롭될 수 있어 07분으로 분산
  schedule:
    - cron: '7 10 * * 1-5'   # 월~금 평일만 (주말 제외)

  # ── 수동 실행 버튼 (테스트용) ──
  workflow_dispatch:
    inputs:
      scope:
        description: '범위 선택 (1=100개 / 2=300개 / 3=전체)'
        required: false
        default: '2'

permissions:
  contents: write   # 매매신호 JSON을 레포에 커밋하기 위해 필요

jobs:
  quant-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      # ① 레포지터리 체크아웃
      - name: 레포지터리 체크아웃
        uses: actions/checkout@v4

      # ② Python 설치
      - name: Python 3.11 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # ③ 패키지 설치
      - name: 패키지 설치
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      # ④ DART API 키 파일 생성
      - name: DART API 키 설정
        run: echo "${{ secrets.DART_API_KEY }}" > dart_api.txt

      # ⑤ 퀀트 스크리너 실행 (스크리닝만 — KIS 자동매매는 별도 워크플로우에서)
      - name: 퀀트 스크리너 실행
        run: |
          SCOPE="${{ github.event.inputs.scope || '2' }}"
          echo "▶ 스크리닝 범위: ${SCOPE}"
          python quant_screener_v41f.py \
            --auto \
            --scope "${SCOPE}" \
            --no-cache \
            --no-telegram
          echo "▶ 실행 완료"

      - name: dart_api.txt 삭제
        if: always()
        run: rm -f dart_api.txt

      # ⑥ 매매신호 JSON을 레포에 커밋
      #    → 다음날 장중에 도는 quant_trade.yml 이 이 파일을 읽어서 KIS 주문 실행
      - name: 매매신호 JSON 커밋
        if: always()
        run: |
          mkdir -p signals
          cp 매매신호_KR_*.json signals/ 2>/dev/null || echo "▶ 매매신호 JSON 없음 (필터 통과 0개였을 수 있음)"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add signals/
          if git diff --staged --quiet; then
            echo "▶ 변경사항 없음 — 커밋 스킵"
          else
            git commit -m "퀀트 스크리닝 결과 ${{ github.run_number }} ($(date '+%Y-%m-%d %H:%M'))"
            git push
          fi

      # ⑦ 엑셀 + JSON 아티팩트 저장 (30일 보관, 사람이 직접 받아보는 용도)
      - name: 📊 결과 파일 저장
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: 퀀트결과-${{ github.run_number }}-${{ github.run_id }}
          path: |
            quant_*.xlsx
            매매신호_*.json
          retention-days: 30
          if-no-files-found: warn
